name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx next build --webpack
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder"
          CLERK_SECRET_KEY: "sk_test_placeholder"
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: "/"
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: "/"
          UPLOADTHING_TOKEN: "placeholder"
          MUX_TOKEN_ID: "placeholder"
          MUX_TOKEN_SECRET: "placeholder"
          STRIPE_API_KEY: "sk_test_placeholder"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm audit --audit-level=critical || true

      - name: Check for .env files in repo
        run: |
          if find . -name '.env' -not -path './node_modules/*' -not -path './.git/*' | grep -q .; then
            echo "::error::Found .env files committed to repository!"
            exit 1
          fi

      - name: Check for hardcoded secrets
        run: |
          if grep -rn --include='*.ts' --include='*.tsx' --include='*.js' \
            -E '(sk_live_|pk_live_|sk_test_[a-zA-Z0-9]{20,}|password\s*=\s*["\x27][^"\x27]+["\x27])' \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git . ; then
            echo "::error::Potential hardcoded secrets found!"
            exit 1
          fi
